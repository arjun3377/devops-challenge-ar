name: CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: app-ci

jobs:
  lint-and-build: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8 pytest

      - name: Lint Python
        run: flake8 app/ --exclude=app/* --exit-zero

      - name: Run unit tests
        run: |
          pytest -v tests/

