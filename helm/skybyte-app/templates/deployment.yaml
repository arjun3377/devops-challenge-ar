apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skybyte-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skybyte-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "skybyte-app.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "skybyte-app.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 15
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
               command: ["sh", "-c", "sleep 5"]
          securityContext:
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-token
                  key: token
          resources:
            requests:
              cpu: 150m
              memory: 100Mi
            limits:
              cpu: 300m
              memory: 200Mi

          startupProbe:
            httpGet:
             path: /
             port: http
            periodSeconds: 5
            failureThreshold: 12 
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0 
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0   
            periodSeconds: 10